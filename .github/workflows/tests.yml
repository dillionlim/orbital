name: Tests

# Runs the three test suites (frontend, backend, trading engine) on every push
# and pull request. Each suite is an independent job so a failure in one still
# reports results for the others.
#
# See testing.md for what each suite covers and how to run it locally.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same branch cancels the older in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Node 20 ships npm 10. The lockfile must stay on npm 10 — npm 11
      # rewrites the @emnapi entries and breaks `npm ci` on Cloudflare Pages.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  backend:
    name: Backend (jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      # The specs mock PrismaService, but the generated client must still exist
      # for the imports in the module graph to resolve.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

  trading-engine:
    name: Trading engine (ctest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading_engine
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B ./build/tests -S . -DCMAKE_BUILD_TYPE=Debug

      - name: Build test binaries
        run: >
          cmake --build ./build/tests
          --target order_book_tests matching_engine_tests mpsc_ring_tests session_tests
          protocol_tests ws_frame_tests auth_tests
          -- -j"$(nproc)"

      - name: Run ctest
        run: ctest --test-dir ./build/tests --output-on-failure
