name: Publish engine image

# builds trading-engine docker image and pushes it to the ghcr (ghcr.io/dillionlim/bubbles-engine) 
# so others can docker pull and run their own engine pointed at the centrally hosted backend
#
# triggers:
#   - pushing version tag (v1.2.3) -> publishes that version + `latest`
#   - manual run from the Actions tab -> publishes `latest` + a short-sha tag
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bubbles-engine
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./trading_engine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
